defaults: !include ../../default.yaml

overrides:
    alignment:
        llm_model_name: "Qwen/Qwen2.5-0.5B"
        lvm_model_name: "vit_large_patch14_dinov2.lvd142m"

    features:
        dataset: "coco"
        batch_size: 64
        num_workers: 0
        # Pin the selected layer pair (COCO ViT-L -> (23, 23)), skipping
        # mutual-kNN layer selection. token_level (below) decides token-vs-CLS.
        layer_img: 23
        layer_txt: 23

    layer_selection:
        best_only: true
        last_only: false

    training:
        token_level: true

        alignment_layer_name: "SAILAlignmentLayer"
        alignment_layer_kwargs:
            dim_alignment: 512
            width_factor: 8
            concat_cls_patch: true

        batch_size: 4096

        clip_loss_name: "CLIPLoss"
        clip_loss:
            temperature: 0.05
            normalize_latents: true
            warmup_steps: 1000
            structure_lambda: 0
            structure_levels: 1
            structure_margin: 0.0
            structure_weighting: "none"

    evaluation:
        token_level_zero_shot: true
        zero_shot_datasets:
            - "cifar10"
            - "stl10"
            - "cifar100"
            - "mnist"
        retrieval_datasets:
            - "flickr30"
            - "coco_karpathy"
