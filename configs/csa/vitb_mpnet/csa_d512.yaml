defaults: !include ../../default.yaml

overrides:
    # CSA (closed-form CCA) sim_dim=512, ViT-B + mpnet (768d each).
    alignment:
        llm_model_name: "sentence-transformers/all-mpnet-base-v2"
        lvm_model_name: "vit_base_patch14_dinov2.lvd142m"

    features:
        batch_size: 64
        num_workers: 4

    training:
        batch_size: 4096

        cca: true
        cca_kwargs:
            sim_dim: 512
            equal_weights: False
            use_reg: False

    layer_selection:
        best_only: true
        last_only: false

    evaluation:
        zero_shot_datasets:
            - "stl10"
            - "cifar10"
            - "cifar100"
            - "imagenet"
            - "dtd"
            - "eurosat"
        retrieval_datasets:
            - "flickr30"
            - "coco_karpathy"
